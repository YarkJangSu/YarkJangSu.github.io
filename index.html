<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple HTML Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            font-size: 3em;
            color: #333;
            text-align: center;
            margin-bottom: 20px;
        }
        h2 {
            font-size: 2em;
            color: #666;
            text-align: center;
            margin-bottom: 10px;
        }
        p {
            font-size: 1em;
            color: #999;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>This is a Huge Title</h1>
    <h2>This is a Medium-Sized Text</h2>
    <p>This is a smaller text.</p>
</body>
</html>
